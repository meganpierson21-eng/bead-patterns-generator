<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
body { font-family: Arial; margin:0; background:#f8fafc; padding-bottom:140px; }
header { text-align:center; padding:14px; font-weight:bold; font-size:22px; }

.card { background:white; margin:10px; padding:10px; border-radius:12px; border:1px solid #ccc; }

.pattern-scroll {
    height:420px;
    overflow:auto;
    border:1px solid #ccc;
    border-radius:12px;
    padding:30px;
}

#patternScale { transform-origin: top center; }

.pattern-row {
    display:flex;
    justify-content:center;
    margin-bottom:3px;
}

.bead {
    width:20px;
    height:20px;
    border-radius:50%;
    border:1px solid #bbb;
    margin:1px;
}

.fringe-row {
    display:flex;
    justify-content:center;
    gap:3px;
    margin-top:10px;
}

.fringe-col {
    display:flex;
    flex-direction:column;
    gap:3px;
    align-items:center;
}

.bottom-tools {
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    background:white;
    padding:8px;
    border-top:1px solid #ccc;
}

button { padding:10px; border-radius:10px; border:none; background:#4f46e5; color:white; font-weight:bold; }
</style>
</head>

<body>

<header>Bead Pattern Designer</header>

<div class="card">
Pattern:
<select id="type">
<option value="diamond">Diamond</option>
<option value="brick">Brick</option>
<option value="loom">Loom</option>
</select>

<br><br>
Width: <input id="width" type="number" value="17"><br><br>
Center Fringe: <input id="maxF" type="number" value="30"><br><br>
Side Fringe: <input id="minF" type="number" value="8"><br><br>

<button onclick="generate()">Generate</button>
</div>

<div class="card">
<div class="pattern-scroll" id="scroll">
<div id="patternScale"></div>
</div>
</div>

<div class="bottom-tools">
<button onclick="zoom(-.1)">-</button>
<button onclick="zoom(.1)">+</button>
<button onclick="resetZoom()">Reset</button>
</div>

<script>

let scale = 1;

function zoom(v){
    scale += v;
    if(scale<.4) scale=.4;
    if(scale>2.5) scale=2.5;
    applyZoom();
}

function resetZoom(){
    scale=1;
    applyZoom();
}

function applyZoom(){
    document.getElementById("patternScale").style.transform = `scale(${scale})`;
}

function bead(){
    let b=document.createElement("div");
    b.className="bead";
    return b;
}

function row(count){
    let r=document.createElement("div");
    r.className="pattern-row";
    for(let i=0;i<count;i++) r.appendChild(bead());
    return r;
}

function generate(){
    let area=document.getElementById("patternScale");
    area.innerHTML="";

    let width=parseInt(widthInput.value);
    let maxF=parseInt(maxFInput.value);
    let minF=parseInt(minFInput.value);

    if(width%2===0) width++;

    let rows=[];

    // build diamond rows
    for(let i=3;i<=width;i++) rows.push(i);
    for(let i=width-1;i>=1;i--) rows.push(i);

    // render diamond
    rows.forEach(c=>{
        area.appendChild(row(c));
    });

    // ---- FRINGE LOGIC (FIXED) ----

    let fringeRow=document.createElement("div");
    fringeRow.className="fringe-row";

    let center=Math.floor(width/2);
    let maxDist=center;

    for(let i=0;i<width;i++){
        let col=document.createElement("div");
        col.className="fringe-col";

        let dist=Math.abs(i-center);
        let ratio=dist/maxDist;

        let len=Math.round(maxF-(maxF-minF)*ratio);
        if(len<1) len=1;

        // 👇 THIS is the important fix:
        // shift columns UP to match diamond edge
        let offset = rows[rows.length-1] === 1 ? Math.abs(i-center) : 0;

        col.style.marginTop = (offset * 22) + "px";

        for(let j=0;j<len;j++){
            col.appendChild(bead());
        }

        fringeRow.appendChild(col);
    }

    area.appendChild(fringeRow);
}

generate();

</script>

</body>
</html>

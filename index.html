<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bead Pattern Designer</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f8fafc;
            color: #1e293b;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        .card {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            padding: 16px;
            max-width: 500px;
            margin: 20px auto;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
        }
    </style>
</head>

<body>

<h1>Bead Pattern Designer</h1>

<div class="card">
    <p>If you see this styled card and button, CSS is working.</p>
    <button onclick="alert('JavaScript is working!')">Test JavaScript</button>
</div>

</body>
</html>

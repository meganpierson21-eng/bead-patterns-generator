<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bead Pattern Designer</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Beads">

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

body { padding-bottom: 155px; }

header {
    background: white;
    padding: 14px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #cbd5e1;
}

.card {
    background: white;
    margin: 12px;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #cbd5e1;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
}

input, select, button {
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
}

button {
    background: #4f46e5;
    color: white;
    border: none;
    font-weight: bold;
}

.settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.settings-grid button { grid-column: 1 / -1; }
.full { width: 100%; }

.palette {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 4px;
}

.swatch {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
}

.zoom-controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
}

.pattern-scroll {
    width: 100%;
    height: 460px;
    overflow: auto;
    border: 1px solid #cbd5e1;
    border-radius: 14px;
    background: white;
    padding: 40px 80px 80px 40px;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
}

#patternArea {
    display: inline-block;
    min-width: max-content;
}

#patternScale {
    display: inline-block;
    transform-origin: top center;
}

.pattern-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3px;
}

.row-label {
    width: 92px;
    text-align: right;
    padding-right: 8px;
    font-size: 11px;
    color: #64748b;
    flex-shrink: 0;
}

.bead-row {
    display: flex;
    gap: 3px;
    justify-content: center;
}

.bead {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #cbd5e1;
    background: #ffffff;
    flex-shrink: 0;
}

.fringe-guide {
    display: flex;
    justify-content: center;
    margin-top: 14px;
    padding-left: 92px;
}

.fringe-row {
    display: flex;
    gap: 3px;
}

.fringe-dot {
    width: 22px;
    height: 22px;
    border: 1px dashed #94a3b8;
    border-radius: 50%;
    font-size: 10px;
    color: #64748b;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.fringe-builder {
    display: flex;
    justify-content: center;
    margin-top: 8px;
    padding-left: 92px;
}

.fringe-columns {
    display: flex;
    gap: 3px;
    align-items: flex-start;
}

.fringe-column {
    width: 22px;
    display: flex;
    flex-direction: column;
    gap: 3px;
    align-items: center;
}

.bottom-tools {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: white;
    border-top: 1px solid #cbd5e1;
    padding: 8px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
}

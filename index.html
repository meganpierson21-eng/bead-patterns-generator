<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead Pattern Designer</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    padding: 20px;
}

h1 {
    text-align: center;
}

.card {
    background: white;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    padding: 16px;
    max-width: 760px;
    margin: 20px auto;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    overflow-x: auto;
}

.controls {
    max-width: 420px;
    margin: 0 auto 20px auto;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
}

input, button {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    margin-bottom: 12px;
    border-radius: 8px;
}

input {
    border: 1px solid #cbd5e1;
}

button {
    border: none;
    background: #4f46e5;
    color: white;
}

button.secondary {
    background: #64748b;
}

button.danger {
    background: #dc2626;
}

.tool-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.color-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
}

.color-row input {
    width: 70px;
    height: 55px;
    padding: 2px;
    margin-bottom: 0;
}

.pattern-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2px;
}

.label {
    width: 90px;
    text-align: right;
    padding-right: 8px;
    font-size: 12px;
    color: #64748b;
    flex-shrink: 0;
}

.beads {
    display: flex;
    gap: 2px;
}

.bead {
    width: 20px;
    height: 20px;
    border: 1px solid #cbd5e1;
    border-radius: 50%;
    background: white;
    flex-shrink: 0;
    cursor: pointer;
}

.bead:hover {
    outline: 2px solid #60a5fa;
}

.selected-tool {
    outline: 3px solid #111827;
}

.palette {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 12px;
}

.swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Bead Pattern Designer</h1>

<div class="card">
    <div class="controls">
        <label for="widthInput">Widest Point Beads</label>
        <input id="widthInput" type="number" value="15" min="3" max="51">

        <button onclick="generatePattern()">Generate Diamond Top</button>

        <label>Color</label>
        <div class="color-row">
            <input id="colorPicker" type="color" value="#000000">
            <span id="currentToolText">Tool: Paint</span>
        </div>

        <div class="palette" id="palette"></div>

        <div class="tool-row">
            <button id="paintBtn" onclick="setTool('paint')" class="selected-tool">Paint</button>
            <button id="eraseBtn" onclick="setTool('erase')" class="secondary">Erase</button>
        </div>

        <button class="danger" onclick="clearPattern()">Clear Colors</button>
    </div>

    <div id="patternArea"></div>
</div>

<script>
var currentTool = "paint";
var isMouseDown = false;

var paletteColors = [
    "#000000", "#FFFFFF", "#FF0000", "#FFA500", "#FFFF00",
    "#008000", "#0000FF", "#800080", "#FFC0CB", "#964B00",
    "#40E0D0", "#FFD700", "#C0C0C0", "#A9A9A9",
    "#7C2D12", "#06B6D4", "#581C87"
];

function makeRow(count, labelText) {
    var rowWrap = document.createElement("div");
    rowWrap.className = "pattern-row";

    var label = document.createElement("div");
    label.className = "label";
    label.textContent = labelText || "";
    rowWrap.appendChild(label);

    var beads = document.createElement("div");
    beads.className = "beads";

    for (var i = 0; i < count; i++) {
        var bead = document.createElement("div");
        bead.className = "bead";
        bead.dataset.color = "#FFFFFF";

        bead.addEventListener("mousedown", function () {
            isMouseDown = true;
            colorBead(this);
        });

        bead.addEventListener("mouseover", function () {
            if (isMouseDown) {
                colorBead(this);
            }
        });

        beads.appendChild(bead);
    }

    rowWrap.appendChild(beads);
    return rowWrap;
}

function generatePattern() {
    var area = document.getElementById("patternArea");
    area.innerHTML = "";

    var width = parseInt(document.getElementById("widthInput").value, 10);

    if (isNaN(width) || width < 3) {
        width = 15;
    }

    if (width % 2 === 0) {
        width = width + 1;
        document.getElementById("widthInput").value = width;
    }

    area.appendChild(makeRow(2, "loop"));
    area.appendChild(makeRow(2, "loop"));
    area.appendChild(makeRow(2, "loop"));

    for (var up = 3; up <= width; up++) {
        area.appendChild(makeRow(up, up === width ? "side start" : ""));
    }

    for (var down = width - 1; down >= 1; down--) {
        area.appendChild(makeRow(down, down === 1 ? "center start" : ""));
    }
}

function colorBead(bead) {
    var color;

    if (currentTool === "erase") {
        color = "#FFFFFF";
    } else {
        color = document.getElementById("colorPicker").value;
    }

    bead.style.backgroundColor = color;
    bead.dataset.color = color;
}

function setTool(tool) {
    currentTool = tool;

    document.getElementById("paintBtn").classList.remove("selected-tool");
    document.getElementById("eraseBtn").classList.remove("selected-tool");

    if (tool === "paint") {
        document.getElementById("paintBtn").classList.add("selected-tool");
        document.getElementById("currentToolText").textContent = "Tool: Paint";
    }

    if (tool === "erase") {
        document.getElementById("eraseBtn").classList.add("selected-tool");
        document.getElementById("currentToolText").textContent = "Tool: Erase";
    }
}

function clearPattern() {
    var beads = document.querySelectorAll(".bead");

    beads.forEach(function (bead) {
        bead.style.backgroundColor = "#FFFFFF";
        bead.dataset.color = "#FFFFFF";
    });
}

function buildPalette() {
    var palette = document.getElementById("palette");
    palette.innerHTML = "";

    paletteColors.forEach(function (color) {
        var swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.backgroundColor = color;
        swatch.title = color;

        swatch.addEventListener("click", function () {
            document.getElementById("colorPicker").value = color;
            setTool("paint");
        });

        palette.appendChild(swatch);
    });
}

document.addEventListener("mouseup", function () {
    isMouseDown = false;
});

buildPalette();
generatePattern();
</script>

</body>
</html>

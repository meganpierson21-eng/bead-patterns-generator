<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead Pattern Designer Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:linear-gradient(135deg,#f8fafc,#dbeafe,#fce7f3);color:#1e293b}
.topbar{position:sticky;top:0;z-index:10;background:white;box-shadow:0 2px 8px #0002;padding:12px;display:flex;justify-content:space-around;gap:8px}
button,label.button{border:0;background:white;padding:8px 10px;border-radius:8px;font-size:16px;color:#1e293b;cursor:pointer}
button:hover,label.button:hover{background:#f1f5f9}
.container{padding:16px;max-width:1300px;margin:auto}
.title{text-align:center;background:#ffffffcc;border-radius:16px;padding:16px;margin-bottom:18px;box-shadow:0 4px 12px #0001}
.layout{display:grid;grid-template-columns:260px 1fr 260px;gap:18px}
.panel{background:#ffffffcc;border-radius:16px;padding:16px;box-shadow:0 4px 12px #0001}
.panel h2{margin-top:0}
input,select{width:100%;padding:8px;margin-top:4px;border:1px solid #cbd5e1;border-radius:8px}
.control{margin-bottom:14px}
.main{overflow:auto;min-height:600px}
.pattern-row-wrap{display:flex;align-items:center;margin-bottom:2px}
.ruler{width:72px;font-size:11px;color:#64748b;text-align:right;padding-right:8px;flex-shrink:0}
.bead-row{display:flex;gap:2px;justify-content:center}
.bead{width:20px;height:20px;border:1px solid #cbd5e1;background:white;cursor:pointer;flex-shrink:0}
.bead:hover{outline:2px solid #60a5fa}
.round{border-radius:50%}
.cylinder{border-radius:4px}
.swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid #e5e7eb;cursor:pointer}
.selected{outline:3px solid #3b82f6!important}
.toolgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.toolgrid button,.fullbtn{border:1px solid #cbd5e1}
.primary{background:#4f46e5;color:white;width:100%;font-weight:bold}
.primary:hover{background:#4338ca}
.hidden{display:none!important}
.note{font-size:12px;color:#64748b;text-align:center;margin-top:8px}
#printArea{background:white;padding:24px;width:900px}
@media(max-width:900px){
.layout{grid-template-columns:1fr}
.topbar button,.topbar label.button{font-size:15px;padding:6px}
}
</style>
</head>

<body>

<header class="topbar">
<button id="saveProject">Save<br>Project</button>
<label class="button">Load<br>Project<input id="loadProject" type="file" accept=".json,.beadpattern" hidden></label>
<button id="exportImage">Export<br>Image</button>
<button id="exportPDF">Export<br>PDF</button>
<button id="clearBtn">Clear</button>
</header>

<div class="container">
<div class="title">
<h1>Bead Pattern Designer Pro</h1>
<p>Diamond earring tops, brick fringe, loom, and bead graphing.</p>
</div>

<div class="layout">

<aside class="panel">
<h2>Pattern Settings</h2>

<div class="control">
<label>Pattern Type</label>
<select id="patternType">
<option value="diamond" selected>Diamond Earring Top</option>
<option value="brick">Brick + Fringe</option>
<option value="loom">Loom</option>
</select>
</div>

<div class="control">
<label id="widthLabel">Widest Point Beads</label>
<input id="widthInput" type="number" value="15" min="3" max="51">
</div>

<div id="lengthWrap" class="control">
<label>Length / Fringe Rows</label>
<input id="lengthInput" type="number" value="30" min="1" max="200">
</div>

<div id="fringeWrap" class="control">
<label>Number of Fringes</label>
<input id="fringeInput" type="number" value="17" min="1" max="99">
</div>

<div class="control">
<label>Bead Shape</label>
<select id="beadShape">
<option value="round" selected>Round Seed Bead</option>
<option value="cylinder">Cylinder / Delica</option>
</select>
</div>

<button id="applyBtn" class="primary">Apply Settings</button>

<p class="note">
Diamond top: loop is 3 rows of 2 beads. Body starts at 3 beads, increases to widest point, then decreases to 1.
</p>
</aside>

<main class="panel main">
<div style="margin-bottom:10px">
<button id="zoomOut">−</button>
<button id="zoomReset">100%</button>
<button id="zoomIn">+</button>
</div>
<div id="patternArea"></div>
</main>

<aside class="panel">
<h2>Color Tools</h2>

<div class="control">
<input id="colorPicker" type="color" value="#000000" style="width:70px;height:70px">
</div>

<div id="palette" class="swatches"></div>

<br>

<div class="toolgrid">
<button id="paintTool" class="selected">Paint</button>
<button id="eraseTool">Erase</button>
<button id="pickTool">Pick</button>
<button id="replaceTool">Replace</button>
</div>

<br>

<div class="toolgrid">
<button id="mirrorV">Mirror V</button>
<button id="mirrorH">Mirror H</button>
</div>

<br>

<button id="countBtn" class="fullbtn" style="width:100%">Bead Count</button>
<div id="countBox" style="font-size:14px;margin-top:10px"></div>

<hr>

<h2>Image Reference</h2>
<input id="imageInput" type="file" accept="image/*">
<img id="imagePreview" class="hidden" style="max-width:100%;border-radius:10px;margin-top:10px">
<button id="paletteFromImage" class="hidden fullbtn" style="width:100%;margin-top:10px">Generate Palette</button>
</aside>

</div>
</div>

<div id="printArea" class="hidden">
<h1>Bead Pattern</h1>
<div id="printPattern"></div>
<h2>Color Key</h2>
<div id="printKey"></div>
<h2>Word Chart</h2>
<div id="wordChart" style="font-size:12px"></div>
</div>

<script>
var activeTool = "paint";
var isDown = false;
var zoom = 1;
var uploadedImage = null;

var colors = [
"#000000","#FFFFFF","#FF0000","#FFA500","#FFFF00","#008000","#0000FF",
"#800080","#FFC0CB","#964B00","#40E0D0","#FFD700","#C0C0C0","#A9A9A9"
];

function el(id){return document.getElementById(id);}

function hexFromRgb(value){
  if(!value){return "#FFFFFF";}
  if(value.charAt(0)==="#"){return value.toUpperCase();}
  var nums = value.match(/\d+/g);
  if(!nums || nums.length < 3){return "#FFFFFF";}
  var r = Number(nums[0]).toString(16).padStart(2,"0");
  var g = Number(nums[1]).toString(16).padStart(2,"0");
  var b = Number(nums[2]).toString(16).padStart(2,"0");
  return ("#" + r + g + b).toUpperCase();
}

function setTool(tool){
  activeTool = tool;
  ["paintTool","eraseTool","pickTool","replaceTool"].forEach(function(id){
    el(id).classList.remove("selected");
  });
  if(tool==="paint"){el("paintTool").classList.add("selected");}
  if(tool==="erase"){el("eraseTool").classList.add("selected");}
  if(tool==="pick"){el("pickTool").classList.add("selected");}
  if(tool==="replace"){el("replaceTool").classList.add("selected");}
}

function makeBead(){
  var bead = document.createElement("div");
  bead.className = "bead " + (el("beadShape").value === "round" ? "round" : "cylinder");
  bead.dataset.color = "#FFFFFF";
  bead.style.backgroundColor = "#FFFFFF";
  return bead;
}

function makeRow(count,label){
  var wrap = document.createElement("div");
  wrap.className = "pattern-row-wrap";

  var ruler = document.createElement("div");
  ruler.className = "ruler";
  ruler.textContent = label || "";
  wrap.appendChild(ruler);

  var row = document.createElement("div");
  row.className = "bead-row";

  for(var i=0;i<count;i++){
    row.appendChild(makeBead());
  }

  wrap.appendChild(row);
  return wrap;
}

function makeAnchorRow(fringeCount){
  var wrap = document.createElement("div");
  wrap.className = "pattern-row-wrap";
  wrap.style.marginTop = "10px";

  var ruler = document.createElement("div");
  ruler.className = "ruler";
  ruler.textContent = "fringe";
  wrap.appendChild(ruler);

  var row = document.createElement("div");
  row.className = "bead-row";

  var center = Math.ceil(fringeCount / 2);

  for(var i=1;i<=fringeCount;i++){
    var a = document.createElement("div");
    a.className = "bead round";
    a.style.backgroundColor = "#f8fafc";
    a.style.border = "1px dashed #94a3b8";
    a.style.fontSize = "9px";
    a.style.display = "flex";
    a.style.alignItems = "center";
    a.style.justifyContent = "center";
    a.dataset.anchor = "true";

    if(i === center){a.textContent = "C";}
    else if(i === 1 || i === fringeCount){a.textContent = "S";}
    else{a.textContent = String(i);}

    row.appendChild(a);
  }

  wrap.appendChild(row);
  return wrap;
}

function generatePattern(){
  var area = el("patternArea");
  area.innerHTML = "";

  var type = el("patternType").value;
  var width = parseInt(el("widthInput").value,10) || 15;
  var length = parseInt(el("lengthInput").value,10) || 30;
  var fringeCount = parseInt(el("fringeInput").value,10) || 17;

  if(type === "diamond"){
    if(width < 3){width = 3;}
    if(width % 2 === 0){width = width + 1;}
    el("widthInput").value = width;

    area.appendChild(makeRow(2,"loop"));
    area.appendChild(makeRow(2,"loop"));
    area.appendChild(makeRow(2,"loop"));

    for(var up=3; up<=width; up++){
      area.appendChild(makeRow(up, up === width ? "side start" : ""));
    }

    for(var down=width-1; down>=1; down--){
      area.appendChild(makeRow(down, down === 1 ? "center start" : ""));
    }

    area.appendChild(makeAnchorRow(fringeCount));

    var note = document.createElement("div");
    note.className = "note";
    note.innerHTML = "<b>C</b> = middle fringe starts at final single bead. <b>S</b> = side pieces start at widest row.";
    area.appendChild(note);
  }

  if(type === "brick"){
    for(var top=2; top<=width; top++){
      area.appendChild(makeRow(top,"top"));
    }
    for(var r=1; r<=length; r++){
      area.appendChild(makeRow(width, r % 5 === 0 ? String(r) : "-"));
    }
  }

  if(type === "loom"){
    for(var l=1; l<=length; l++){
      area.appendChild(makeRow(width, l % 5 === 0 ? String(l) : "-"));
    }
  }
}

function applyBead(bead,color){
  if(!bead || bead.dataset.anchor === "true"){return;}
  bead.dataset.color = color;
  bead.style.backgroundColor = color;
}

function handleBead(bead){
  if(!bead || !bead.classList.contains("bead") || bead.dataset.anchor === "true"){return;}

  if(activeTool === "pick"){
    el("colorPicker").value = hexFromRgb(bead.style.backgroundColor);
    setTool("paint");
    return;
  }

  if(activeTool === "replace"){
    var oldColor = hexFromRgb(bead.style.backgroundColor);
    var newColor = el("colorPicker").value.toUpperCase();

    document.querySelectorAll(".bead").forEach(function(b){
      if(b.dataset.anchor !== "true" && hexFromRgb(b.style.backgroundColor) === oldColor){
        applyBead(b,newColor);
      }
    });

    setTool("paint");
    return;
  }

  var color = activeTool === "erase" ? "#FFFFFF" : el("colorPicker").value.toUpperCase();
  applyBead(bead,color);

  var row = bead.parentElement;
  var rows = Array.from(document.querySelectorAll(".bead-row")).filter(function(r){
    return r.querySelector(".bead[data-anchor='true']") === null;
  });
  var beads = Array.from(row.children);
  var rowIndex = rows.indexOf(row);
  var beadIndex = beads.indexOf(bead);

  if(el("mirrorV").classList.contains("selected")){
    var mirror = beads[beads.length - 1 - beadIndex];
    applyBead(mirror,color);
  }

  if(el("mirrorH").classList.contains("selected")){
    var mirrorRow = rows[rows.length - 1 - rowIndex];
    if(mirrorRow && mirrorRow.children[beadIndex]){
      applyBead(mirrorRow.children[beadIndex],color);
    }
  }
}

function setupPalette(){
  var palette = el("palette");
  palette.innerHTML = "";

  colors.forEach(function(color){
    var swatch = document.createElement("div");
    swatch.className = "swatch";
    swatch.style.backgroundColor = color;
    swatch.title = color;
    swatch.onclick = function(){
      el("colorPicker").value = color;
      setTool("paint");
    };
    palette.appendChild(swatch);
  });
}

function getProjectData(){
  return {
    settings:{
      patternType:el("patternType").value,
      width:el("widthInput").value,
      length:el("lengthInput").value,
      fringe:el("fringeInput").value,
      shape:el("beadShape").value
    },
    beads:Array.from(document.querySelectorAll(".bead-row")).filter(function(row){
      return row.querySelector(".bead[data-anchor='true']") === null;
    }).map(function(row){
      return Array.from(row.children).map(function(b){
        return hexFromRgb(b.style.backgroundColor);
      });
    })
  };
}

function loadProjectData(data){
  el("patternType").value = data.settings.patternType || "diamond";
  el("widthInput").value = data.settings.width || 15;
  el("lengthInput").value = data.settings.length || 30;
  el("fringeInput").value = data.settings.fringe || 17;
  el("beadShape").value = data.settings.shape || "round";

  updateControls();
  generatePattern();

  var rows = Array.from(document.querySelectorAll(".bead-row")).filter(function(row){
    return row.querySelector(".bead[data-anchor='true']") === null;
  });

  data.beads.forEach(function(rowData,i){
    if(!rows[i]){return;}
    rowData.forEach(function(color,j){
      if(rows[i].children[j]){
        applyBead(rows[i].children[j],color);
      }
    });
  });
}

function saveProject(){
  var blob = new Blob([JSON.stringify(getProjectData())],{type:"application/json"});
  var a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "bead-pattern.beadpattern";
  a.click();
  URL.revokeObjectURL(a.href);
}

function preparePrint(){
  el("printPattern").innerHTML = el("patternArea").innerHTML;

  var used = new Map();

  document.querySelectorAll("#patternArea .bead").forEach(function(b){
    if(b.dataset.anchor === "true"){return;}
    var c = hexFromRgb(b.style.backgroundColor);
    if(c !== "#FFFFFF" && !used.has(c)){
      used.set(c,String.fromCharCode(65 + used.size));
    }
  });

  var keyHtml = "";
  used.forEach(function(letter,color){
    keyHtml += "<div style='display:flex;align-items:center;gap:8px;margin:4px 0;'>";
    keyHtml += "<div style='width:20px;height:20px;border-radius:50%;background:"+color+";border:1px solid #ccc'></div>";
    keyHtml += "<span>("+letter+") "+color+"</span></div>";
  });
  el("printKey").innerHTML = keyHtml || "No colors used.";

  var wordHtml = "";
  var rows = Array.from(document.querySelectorAll("#patternArea .bead-row")).filter(function(row){
    return row.querySelector(".bead[data-anchor='true']") === null;
  });

  rows.forEach(function(row,i){
    var parts = [];
    var last = null;
    var count = 0;

    Array.from(row.children).forEach(function(b){
      var c = hexFromRgb(b.style.backgroundColor);
      var symbol = c === "#FFFFFF" ? "-" : used.get(c);

      if(symbol !== last){
        if(count > 0 && last !== "-"){parts.push("("+last+")x"+count);}
        last = symbol;
        count = 1;
      }else{
        count++;
      }
    });

    if(count > 0 && last !== "-"){parts.push("("+last+")x"+count);}
    wordHtml += "<div><b>Row "+(i+1)+":</b> "+(parts.join(", ") || "blank")+"</div>";
  });

  el("wordChart").innerHTML = wordHtml;
}

async function exportPDF(){
  preparePrint();

  el("printArea").classList.remove("hidden");
  el("printArea").style.position = "absolute";
  el("printArea").style.left = "-9999px";

  var canvas = await html2canvas(el("printArea"),{scale:2,backgroundColor:"#ffffff"});
  var img = canvas.toDataURL("image/png");
  var jsPDF = window.jspdf.jsPDF;
  var pdf = new jsPDF("p","pt","letter");

  var pw = pdf.internal.pageSize.getWidth();
  var ph = pdf.internal.pageSize.getHeight();
  var margin = 30;
  var ratio = Math.min((pw - margin * 2) / canvas.width, (ph - margin * 2) / canvas.height);
  var w = canvas.width * ratio;
  var h = canvas.height * ratio;

  pdf.addImage(img,"PNG",(pw - w) / 2,margin,w,h);
  pdf.save("bead-pattern.pdf");

  el("printArea").classList.add("hidden");
}

async function exportImage(){
  preparePrint();

  el("printArea").classList.remove("hidden");
  el("printArea").style.position = "absolute";
  el("printArea").style.left = "-9999px";

  var canvas = await html2canvas(el("printArea"),{scale:2,backgroundColor:"#ffffff"});
  var a = document.createElement("a");
  a.href = canvas.toDataURL("image/png");
  a.download = "bead-pattern.png";
  a.click();

  el("printArea").classList.add("hidden");
}

function beadCount(){
  var counts = {};

  document.querySelectorAll("#patternArea .bead").forEach(function(b){
    if(b.dataset.anchor === "true"){return;}
    var c = hexFromRgb(b.style.backgroundColor);
    if(c === "#FFFFFF"){return;}
    counts[c] = (counts[c] || 0) + 1;
  });

  var html = "";
  Object.keys(counts).forEach(function(c){
    html += "<div><span style='display:inline-block;width:14px;height:14px;background:"+c+";border:1px solid #ccc'></span> "+c+": "+counts[c]+"</div>";
  });

  el("countBox").innerHTML = html || "No colored beads yet.";
}

function updateControls(){
  var isDiamond = el("patternType").value === "diamond";
  el("widthLabel").textContent = isDiamond ? "Widest Point Beads" : "Width Beads";
  el("lengthWrap").style.display = isDiamond ? "none" : "block";
  el("fringeWrap").style.display = isDiamond ? "block" : "none";
}

function generatePaletteFromImage(){
  if(!uploadedImage){return;}

  var img = new Image();
  img.onload = function(){
    var canvas = document.createElement("canvas");
    var ctx = canvas.getContext("2d");
    canvas.width = 150;
    canvas.height = 150;
    ctx.drawImage(img,0,0,150,150);

    var data = ctx.getImageData(0,0,150,150).data;
    var buckets = {};

    for(var i=0;i<data.length;i+=16){
      var r = Math.min(255,Math.round(data[i] / 32) * 32);
      var g = Math.min(255,Math.round(data[i+1] / 32) * 32);
      var b = Math.min(255,Math.round(data[i+2] / 32) * 32);
      var c = "#" + [r,g,b].map(function(x){
        return x.toString(16).padStart(2,"0");
      }).join("").toUpperCase();

      buckets[c] = (buckets[c] || 0) + 1;
    }

    Object.entries(buckets).sort(function(a,b){return b[1]-a[1];}).slice(0,10).forEach(function(entry){
      if(colors.indexOf(entry[0]) === -1){colors.push(entry[0]);}
    });

    setupPalette();
  };

  img.src = uploadedImage;
}

el("patternArea").addEventListener("mousedown",function(e){
  isDown = true;
  if(e.target.classList.contains("bead")){handleBead(e.target);}
});

el("patternArea").addEventListener("mouseover",function(e){
  if(isDown && e.target.classList.contains("bead") && activeTool !== "pick" && activeTool !== "replace"){
    handleBead(e.target);
  }
});

document.addEventListener("mouseup",function(){isDown = false;});

el("applyBtn").onclick = generatePattern;
el("clearBtn").onclick = function(){
  document.querySelectorAll("#patternArea .bead").forEach(function(b){
    applyBead(b,"#FFFFFF");
  });
};

el("paintTool").onclick = function(){setTool("paint");};
el("eraseTool").onclick = function(){setTool("erase");};
el("pickTool").onclick = function(){setTool("pick");};
el("replaceTool").onclick = function(){setTool("replace");};

el("mirrorV").onclick = function(){el("mirrorV").classList.toggle("selected");};
el("mirrorH").onclick = function(){el("mirrorH").classList.toggle("selected");};

el("saveProject").onclick = saveProject;
el("exportPDF").onclick = exportPDF;
el("exportImage").onclick = exportImage;
el("countBtn").onclick = beadCount;

el("loadProject").onchange = function(e){
  var file = e.target.files[0];
  if(!file){return;}

  var reader = new FileReader();
  reader.onload = function(){
    loadProjectData(JSON.parse(reader.result));
  };
  reader.readAsText(file);
};

el("patternType").onchange = function(){
  updateControls();
  generatePattern();
};

el("beadShape").onchange = generatePattern;

el("zoomIn").onclick = function(){
  zoom = Math.min(3,zoom + 0.2);
  el("patternArea").style.transform = "scale("+zoom+")";
  el("patternArea").style.transformOrigin = "top left";
};

el("zoomOut").onclick = function(){
  zoom = Math.max(0.3,zoom - 0.2);
  el("patternArea").style.transform = "scale("+zoom+")";
  el("patternArea").style.transformOrigin = "top left";
};

el("zoomReset").onclick = function(){
  zoom = 1;
  el("patternArea").style.transform = "scale(1)";
};

el("imageInput").onchange = function(e){
  var file = e.target.files[0];
  if(!file){return;}

  var reader = new FileReader();
  reader.onload = function(){
    uploadedImage = reader.result;
    el("imagePreview").src = uploadedImage;
    el("imagePreview").classList.remove("hidden");
    el("paletteFromImage").classList.remove("hidden");
  };
  reader.readAsDataURL(file);
};

el("paletteFromImage").onclick = generatePaletteFromImage;

el("imagePreview").onclick = function(e){
  if(activeTool !== "pick"){return;}

  var img = el("imagePreview");
  var canvas = document.createElement("canvas");
  var ctx = canvas.getContext("2d");

  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  ctx.drawImage(img,0,0);

  var rect = img.getBoundingClientRect();
  var x = Math.floor((e.clientX - rect.left) * (img.naturalWidth / rect.width));
  var y = Math.floor((e.clientY - rect.top) * (img.naturalHeight / rect.height));
  var p = ctx.getImageData(x,y,1,1).data;

  el("colorPicker").value = hexFromRgb("rgb("+p[0]+","+p[1]+","+p[2]+")");
  setTool("paint");
};

setupPalette();
updateControls();
generatePattern();
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bead Pattern Designer</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4f46e5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Beads">

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8fafc;
    color: #1e293b;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

body { padding-bottom: 155px; }

header {
    background: white;
    padding: 14px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #cbd5e1;
}

.version-badge {
    margin-top: 4px;
    font-size: 12px;
    font-weight: normal;
    color: #64748b;
}

.card {
    background: white;
    margin: 12px;
    padding: 12px;
    border-radius: 14px;
    border: 1px solid #cbd5e1;
}

label {
    display: block;
    font-weight: bold;
    margin-bottom: 4px;
}

input, select, button {
    padding: 11px;
    border-radius: 10px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
}

button {
    background: #4f46e5;
    color: white;
    border: none;
    font-weight: bold;
}

.settings-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.settings-grid button { grid-column: 1 / -1; }

.full { width: 100%; }

.palette {
    display: flex;
    overflow-x: auto;
    gap: 8px;
    padding-bottom: 4px;
}

.swatch {
    width: 36px;
    height: 36px;
    min-width: 36px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
}

.zoom-controls {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
}

.pattern-scroll {
    width: 100%;
    height: 460px;
    overflow: auto;
    border: 1px solid #cbd5e1;
    border-radius: 14px;
    background: white;
    padding: 10px 80px 80px 40px;
    -webkit-overflow-scrolling: touch;
    touch-action: pan-x pan-y;
}

#patternArea {
    display: flex;
    justify-content: center;
    align-items: flex-start;
    width: 100%;
}

#patternScale {
    display: inline-block;
    transform-origin: top center;
}

.pattern-row {
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 3px;
}

.row-label {
    width: 92px;
    text-align: right;
    padding-right: 8px;
    font-size: 11px;
    color: #64748b;
    flex-shrink: 0;
}

.bead-row {
    display: flex;
    gap: 3px;
    justify-content: center;
}

.bead {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 1px solid #cbd5e1;
    background: #ffffff;
    flex-shrink: 0;
}

.fringe-guide {
    display: flex;
    justify-content: center;
    margin-top: 14px;
    padding-left: 92px;
}

.fringe-row {
    display: flex;
    gap: 3px;
}

.fringe-dot {
    width: 22px;
    height: 22px;
    border: 1px dashed #94a3b8;
    border-radius: 50%;
    font-size: 10px;
    color: #64748b;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.bottom-tools {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    background: white;
    border-top: 1px solid #cbd5e1;
    padding: 8px;
    padding-bottom: calc(8px + env(safe-area-inset-bottom));
    z-index: 50;
}

.count-bar {
    min-height: 30px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 6px;
}

.count-item {
    display: flex;
    align-items: center;
    gap: 5px;
    background: #eef2ff;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 13px;
    white-space: nowrap;
}

.count-color {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    border: 1px solid #cbd5e1;
}

.tool-grid {
    display: grid;
    grid-template-columns: 62px 1fr 1fr 1fr;
    gap: 8px;
}

.tool-grid input[type="color"] {
    width: 62px;
    height: 50px;
    padding: 2px;
}

.tool-grid button {
    height: 50px;
}

.selected-tool {
    outline: 3px solid #111827;
}

.danger {
    background: #dc2626;
}

.export-btn {
    margin-top: 10px;
}
</style>
</head>

<body>

<header>
    <div>Bead Pattern Designer</div>
    <div class="version-badge">Version 1.0.1 — Stable</div>
</header>

<div class="card">
    <div class="settings-grid">
        <div>
            <label>Pattern Type</label>
            <select id="patternType" class="full" onchange="handlePatternChange()">
                <option value="diamond">Diamond Earring Top</option>
                <option value="brick">Brick Stitch Fringe</option>
                <option value="loom">Loom Rectangle</option>
            </select>
        </div>

        <div>
            <label id="widthLabel">Width</label>
            <input id="widthInput" class="full" type="number" value="17" min="1" max="99">
        </div>

        <div id="lengthSection">
            <label id="lengthLabel">Length</label>
            <input id="lengthInput" class="full" type="number" value="10" min="1" max="200">
        </div>

        <button onclick="handleGenerate()">Generate</button>
    </div>
</div>

<div class="card">
    <label>Palette</label>
    <div class="palette" id="palette"></div>
</div>

<div class="card">
    <div class="zoom-controls">
        <button onclick="zoomGraph(-0.1)">Zoom -</button>
        <button onclick="resetZoom()">Reset</button>
        <button onclick="zoomGraph(0.1)">Zoom +</button>
    </div>
</div>

<div class="card">
    <div class="pattern-scroll" id="patternScroll">
        <div id="patternArea">
            <div id="patternScale"></div>
        </div>
    </div>
</div>

<div class="bottom-tools">
    <div class="count-bar" id="beadCount"></div>

<div class="tool-grid">
    <input type="color" id="colorPicker" value="#000000">
    <button id="paintBtn" class="selected-tool" onclick="setTool('paint')">Paint</button>
    <button id="eraseBtn" onclick="setTool('erase')">Erase</button>
    <button class="danger" onclick="clearPattern()">Clear</button>
</div>

<button class="full export-btn" onclick="testExport()">Export</button>
</div>
</div>

<script>
let currentTool = "paint";
let graphScale = 0.75;
let pointerStartX = 0;
let pointerStartY = 0;
let pointerMoved = false;
let pinchStartDistance = 0;
let pinchStartScale = 1;

const STORAGE_KEY = "bead-pattern-current-v1";

const paletteColors = [
    "#000000", "#FFFFFF", "#FF0000", "#FFA500", "#FFFF00",
    "#008000", "#0000FF", "#800080", "#FFC0CB", "#964B00",
    "#40E0D0", "#FFD700", "#C0C0C0", "#A9A9A9",
    "#7C2D12", "#06B6D4", "#581C87"
];

function buildPalette() {
    const palette = document.getElementById("palette");
    palette.innerHTML = "";

    paletteColors.forEach(function(color) {
        const swatch = document.createElement("div");
        swatch.className = "swatch";
        swatch.style.backgroundColor = color;

        swatch.onclick = function() {
            document.getElementById("colorPicker").value = color;
            setTool("paint");
        };

        palette.appendChild(swatch);
    });
}

function makeBead() {
    const bead = document.createElement("div");
    bead.className = "bead";
    bead.dataset.color = "#FFFFFF";

    bead.addEventListener("pointerdown", function(event) {
        pointerStartX = event.clientX;
        pointerStartY = event.clientY;
        pointerMoved = false;
    });

    bead.addEventListener("pointermove", function(event) {
        const dx = Math.abs(event.clientX - pointerStartX);
        const dy = Math.abs(event.clientY - pointerStartY);
        if (dx > 8 || dy > 8) pointerMoved = true;
    });

    bead.addEventListener("pointerup", function() {
        if (!pointerMoved) colorBead(bead);
    });

    return bead;
}

function makeRow(count, labelText) {
    const wrap = document.createElement("div");
    wrap.className = "pattern-row";

    const label = document.createElement("div");
    label.className = "row-label";
    label.textContent = labelText || "";
    wrap.appendChild(label);

    const row = document.createElement("div");
    row.className = "bead-row";

    for (let i = 0; i < count; i++) {
        row.appendChild(makeBead());
    }

    wrap.appendChild(row);
    return wrap;
}

function makeFringeGuide(width) {
    const guide = document.createElement("div");
    guide.className = "fringe-guide";

    const row = document.createElement("div");
    row.className = "fringe-row";

    const center = Math.ceil(width / 2);

    for (let i = 1; i <= width; i++) {
        const dot = document.createElement("div");
        dot.className = "fringe-dot";

        if (i === center) dot.textContent = "C";
        else if (i === 1 || i === width) dot.textContent = "S";
        else dot.textContent = i;

        row.appendChild(dot);
    }

    guide.appendChild(row);
    return guide;
}

function generatePattern() {
    const area = document.getElementById("patternScale");
    area.innerHTML = "";

    const type = document.getElementById("patternType").value;

    let width = parseInt(document.getElementById("widthInput").value, 10);
    let length = parseInt(document.getElementById("lengthInput").value, 10);

    if (isNaN(width) || width < 1) width = 17;
    if (isNaN(length) || length < 1) length = 10;

    if (type === "diamond") {
        if (width < 3) width = 3;

        if (width % 2 === 0) {
            width++;
            document.getElementById("widthInput").value = width;
        }

        area.appendChild(makeRow(2, "loop"));
        area.appendChild(makeRow(2, "loop"));
        area.appendChild(makeRow(2, "loop"));

        for (let up = 3; up <= width; up++) {
            area.appendChild(makeRow(up, up === width ? "side start" : ""));
        }

        for (let down = width - 1; down >= 1; down--) {
            area.appendChild(makeRow(down, down === 1 ? "center start" : ""));
        }

        area.appendChild(makeFringeGuide(width));
    }

    if (type === "brick") {
        if (width < 2) width = 2;

        for (let top = 2; top <= width; top++) {
            area.appendChild(makeRow(top, top === width ? "fringe start" : ""));
        }

        for (let row = 1; row <= length; row++) {
            area.appendChild(makeRow(width, row % 5 === 0 ? String(row) : ""));
        }
    }

    if (type === "loom") {
        for (let row = 1; row <= length; row++) {
            area.appendChild(makeRow(width, row % 5 === 0 ? String(row) : ""));
        }
    }

    updateBeadCount();
}

function colorBead(bead) {
    const color = currentTool === "erase"
        ? "#FFFFFF"
        : document.getElementById("colorPicker").value.toUpperCase();

    bead.style.backgroundColor = color;
    bead.dataset.color = color;

    updateBeadCount();
    savePattern();
}

function savePattern() {
    const colors = [];

    document.querySelectorAll(".bead").forEach(function(bead) {
        colors.push(bead.dataset.color || "#FFFFFF");
    });

    const data = {
        patternType: document.getElementById("patternType").value,
        width: document.getElementById("widthInput").value,
        length: document.getElementById("lengthInput").value,
        colors: colors
    };

    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadPattern() {
    let data;

    try {
        data = JSON.parse(localStorage.getItem(STORAGE_KEY) || "null");
    } catch (e) {
        localStorage.removeItem(STORAGE_KEY);
        return false;
    }

    if (!data || !data.colors) return false;

    document.getElementById("patternType").value = data.patternType || "diamond";
    document.getElementById("widthInput").value = data.width || "17";
    document.getElementById("lengthInput").value = data.length || "10";

    updateControls();
    generatePattern();

    const beads = document.querySelectorAll(".bead");

    beads.forEach(function(bead, index) {
        if (data.colors[index]) {
            bead.dataset.color = data.colors[index];
            bead.style.backgroundColor = data.colors[index];
        }
    });

    updateBeadCount();
    return true;
}

function clearPattern() {
    document.querySelectorAll(".bead").forEach(function(bead) {
        bead.style.backgroundColor = "#FFFFFF";
        bead.dataset.color = "#FFFFFF";
    });

    localStorage.removeItem(STORAGE_KEY);
    updateBeadCount();
}

function updateBeadCount() {
    const counts = {};

    document.querySelectorAll(".bead").forEach(function(bead) {
        const color = bead.dataset.color;
        if (!color || color === "#FFFFFF") return;
        counts[color] = (counts[color] || 0) + 1;
    });

    const container = document.getElementById("beadCount");
    container.innerHTML = "";

    Object.keys(counts).forEach(function(color) {
        const item = document.createElement("div");
        item.className = "count-item";

        const swatch = document.createElement("div");
        swatch.className = "count-color";
        swatch.style.backgroundColor = color;

        const text = document.createElement("span");
        text.textContent = counts[color];

        item.appendChild(swatch);
        item.appendChild(text);
        container.appendChild(item);
    });
}

function setTool(tool) {
    currentTool = tool;

    document.getElementById("paintBtn").classList.remove("selected-tool");
    document.getElementById("eraseBtn").classList.remove("selected-tool");

    if (tool === "paint") document.getElementById("paintBtn").classList.add("selected-tool");
    if (tool === "erase") document.getElementById("eraseBtn").classList.add("selected-tool");
}

function applyZoom() {
    document.getElementById("patternScale").style.transform = "scale(" + graphScale + ")";
}

function zoomGraph(amount) {
    graphScale += amount;

    if (graphScale < 0.35) graphScale = 0.35;
    if (graphScale > 2.5) graphScale = 2.5;

    applyZoom();
}

function resetZoom() {
    graphScale = 1;
    applyZoom();
}

function getTouchDistance(touches) {
    const dx = touches[0].clientX - touches[1].clientX;
    const dy = touches[0].clientY - touches[1].clientY;
    return Math.sqrt(dx * dx + dy * dy);
}

const patternScroll = document.getElementById("patternScroll");

patternScroll.addEventListener("touchstart", function(event) {
    if (event.touches.length === 2) {
        pinchStartDistance = getTouchDistance(event.touches);
        pinchStartScale = graphScale;
    }
}, { passive: false });

patternScroll.addEventListener("touchmove", function(event) {
    if (event.touches.length === 2) {
        event.preventDefault();

        const newDistance = getTouchDistance(event.touches);
        graphScale = pinchStartScale * (newDistance / pinchStartDistance);

        if (graphScale < 0.35) graphScale = 0.35;
        if (graphScale > 2.5) graphScale = 2.5;

        applyZoom();
    }
}, { passive: false });

let lastTouchEnd = 0;

document.addEventListener("touchend", function(event) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) event.preventDefault();
    lastTouchEnd = now;
}, { passive: false });

function updateControls() {
    const type = document.getElementById("patternType").value;
    const lengthSection = document.getElementById("lengthSection");
    const widthLabel = document.getElementById("widthLabel");
    const lengthLabel = document.getElementById("lengthLabel");

    if (type === "diamond") {
        lengthSection.style.display = "none";
        widthLabel.textContent = "Widest Point";
    } else if (type === "brick") {
        lengthSection.style.display = "block";
        widthLabel.textContent = "Top Width";
        lengthLabel.textContent = "Fringe Length";
    } else {
        lengthSection.style.display = "block";
        widthLabel.textContent = "Width";
        lengthLabel.textContent = "Length";
    }
}

function handleGenerate() {
    generatePattern();
    savePattern();
    applyZoom();
}

function handlePatternChange() {
    updateControls();
    generatePattern();
    savePattern();
    applyZoom();
}

function testExport() {
    const pattern = document.getElementById("patternScale");
    const beadCount = document.getElementById("beadCount");

    const wrapper = document.createElement("div");
    wrapper.style.background = "#ffffff";
    wrapper.style.padding = "30px";
    wrapper.style.display = "inline-block";
    wrapper.style.fontFamily = "Arial, sans-serif";
    wrapper.style.color = "#1e293b";

    const title = document.createElement("h2");
    title.textContent = "Bead Pattern";
    title.style.textAlign = "center";
    title.style.margin = "0 0 20px 0";

    const patternClone = pattern.cloneNode(true);

    const countTitle = document.createElement("h3");
    countTitle.textContent = "Bead Count";
    countTitle.style.margin = "24px 0 10px 0";

    const countClone = beadCount.cloneNode(true);

    wrapper.appendChild(title);
    wrapper.appendChild(patternClone);
    wrapper.appendChild(countTitle);
    wrapper.appendChild(countClone);

    document.body.appendChild(wrapper);

    html2canvas(wrapper, {
        backgroundColor: "#ffffff",
        scale: 3
    }).then(canvas => {
        const link = document.createElement("a");
        link.download = "bead-pattern-printable.png";
        link.href = canvas.toDataURL("image/png");
        link.click();

        document.body.removeChild(wrapper);
    });
}

buildPalette();
updateControls();

if (!loadPattern()) {
    generatePattern();
}

applyZoom();
</script>

</body>
</html>

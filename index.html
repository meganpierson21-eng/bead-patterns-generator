<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bead Pattern Designer</title>

<style>
* { box-sizing: border-box; }

html, body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f8fafc;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
}

header {
    background: white;
    padding: 12px;
    text-align: center;
    font-size: 22px;
    font-weight: bold;
    border-bottom: 1px solid #cbd5e1;
}

.card {
    background: white;
    margin: 12px;
    padding: 12px;
    border-radius: 12px;
    border: 1px solid #cbd5e1;
}

label { display: block; margin-top: 6px; }

input, select, button {
    width: 100%;
    margin-top: 6px;
    padding: 10px;
    border-radius: 8px;
    border: 1px solid #cbd5e1;
    font-size: 16px;
}

button {
    background: #4f46e5;
    color: white;
    border: none;
}

.zoom-controls {
    display: flex;
    gap: 8px;
}

.pattern-scroll {
    overflow: auto;
    border: 1px solid #cbd5e1;
    border-radius: 12px;
    height: 420px;
}

#patternArea {
    display: inline-block;
    transform-origin: top center;
}

.pattern-row {
    display: flex;
    align-items: center;
}

.label {
    width: 90px;
    font-size: 12px;
    color: #64748b;
}

.beads {
    display: flex;
    gap: 4px;
}

.bead {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid #cbd5e1;
    background: white;
}

.palette {
    display: flex;
    overflow-x: auto;
    gap: 8px;
}

.swatch {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
}

.bottom-tools {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: white;
    border-top: 1px solid #cbd5e1;
    padding: 10px;
}

.tool-grid {
    display: flex;
    gap: 8px;
}

.tool-grid button {
    flex: 1;
}

.fringe-row {
    display: flex;
    justify-content: center;
    margin-top: 10px;
    gap: 4px;
}

.fringe-dot {
    width: 20px;
    height: 20px;
    border: 1px dashed #94a3b8;
    border-radius: 50%;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
}
</style>
</head>

<body>

<header>Bead Pattern Designer</header>

<div class="card">
<label>Pattern Type</label>
<select id="patternType" onchange="updateControls(); generatePattern();">
<option value="diamond">Diamond Earring Top</option>
<option value="brick">Brick Stitch Fringe</option>
<option value="loom">Loom Rectangle</option>
</select>

<label>Width</label>
<input id="widthInput" type="number" value="15">

<div id="lengthSection">
<label>Length</label>
<input id="lengthInput" type="number" value="10">
</div>

<button onclick="generatePattern()">Generate</button>
</div>

<div class="card">
<label>Palette</label>
<div class="palette" id="palette"></div>
</div>

<div class="card">
<div class="zoom-controls">
<button onclick="zoomGraph(-0.1)">Zoom -</button>
<button onclick="resetZoom()">Reset</button>
<button onclick="zoomGraph(0.1)">Zoom +</button>
</div>
</div>

<div class="card">
<div class="pattern-scroll" id="patternScroll">
<div id="patternArea"></div>
</div>
</div>

<div class="card">
<h3>Bead Count</h3>
<div id="beadCount"></div>
</div>

<div class="bottom-tools">
<div class="tool-grid">
<input type="color" id="colorPicker" value="#000000">
<button onclick="setTool('paint')" id="paintBtn">Paint</button>
<button onclick="setTool('erase')" id="eraseBtn">Erase</button>
<button onclick="clearPattern()">Clear</button>
</div>
</div>

<script>
let currentTool = "paint";
let zoom = 1;

const paletteColors = [
"#000000","#FFFFFF","#FF0000","#FFA500","#FFFF00",
"#008000","#0000FF","#800080","#FFC0CB"
];

function buildPalette(){
    const p = document.getElementById("palette");
    p.innerHTML="";
    paletteColors.forEach(c=>{
        const s=document.createElement("div");
        s.className="swatch";
        s.style.background=c;
        s.onclick=()=>document.getElementById("colorPicker").value=c;
        p.appendChild(s);
    });
}

function setTool(t){ currentTool=t; }

function zoomGraph(d){
    zoom+=d;
    document.getElementById("patternArea").style.transform=`scale(${zoom})`;
}
function resetZoom(){
    zoom=1;
    document.getElementById("patternArea").style.transform="scale(1)";
}

function updateControls(){
    const type=document.getElementById("patternType").value;
    document.getElementById("lengthSection").style.display =
        type==="diamond" ? "none":"block";
}

function makeRow(count,labelText){
    const row=document.createElement("div");
    row.className="pattern-row";

    const label=document.createElement("div");
    label.className="label";
    label.textContent=labelText||"";
    row.appendChild(label);

    const beads=document.createElement("div");
    beads.className="beads";

    for(let i=0;i<count;i++){
        const b=document.createElement("div");
        b.className="bead";
        b.onclick=()=>colorBead(b);
        beads.appendChild(b);
    }

    row.appendChild(beads);
    return row;
}

function makeFringeGuide(width){
    const row=document.createElement("div");
    row.className="fringe-row";

    const center=Math.ceil(width/2);

    for(let i=1;i<=width;i++){
        const d=document.createElement("div");
        d.className="fringe-dot";
        d.textContent = i===center ? "C" : (i===1||i===width ? "S" : i);
        row.appendChild(d);
    }
    return row;
}

function generatePattern(){
    const area=document.getElementById("patternArea");
    area.innerHTML="";

    const type=document.getElementById("patternType").value;
    let width=parseInt(widthInput.value);
    let length=parseInt(lengthInput.value);

    if(type==="diamond"){
        for(let i=1;i<=width;i++)
            area.appendChild(makeRow(i, i===width?"side start":""));
        for(let i=width-1;i>=1;i--)
            area.appendChild(makeRow(i, i===1?"center start":""));

        area.appendChild(makeFringeGuide(width));
    }

    if(type==="brick"){
        for(let i=1;i<=width;i++)
            area.appendChild(makeRow(i));
        for(let i=0;i<length;i++)
            area.appendChild(makeRow(width));
    }

    if(type==="loom"){
        for(let i=0;i<length;i++)
            area.appendChild(makeRow(width));
    }

    updateCount();
}

function colorBead(b){
    b.style.background =
        currentTool==="erase" ? "#FFFFFF" :
        document.getElementById("colorPicker").value;
    updateCount();
}

function clearPattern(){
    document.querySelectorAll(".bead")
        .forEach(b=>b.style.background="#FFFFFF");
    updateCount();
}

function updateCount(){
    const counts={};
    document.querySelectorAll(".bead").forEach(b=>{
        const c=b.style.background;
        if(c && c!=="white"){
            counts[c]=(counts[c]||0)+1;
        }
    });

    const div=document.getElementById("beadCount");
    div.innerHTML="";
    for(let c in counts){
        const span=document.createElement("span");
        span.style.marginRight="10px";
        span.innerHTML=`<span style="color:${c}">●</span> ${counts[c]}`;
        div.appendChild(span);
    }
}

buildPalette();
updateControls();
generatePattern();
</script>

</body>
</html>

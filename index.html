<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bead Pattern Designer Pro</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial,sans-serif;background:linear-gradient(135deg,#f8fafc,#dbeafe,#fce7f3);min-height:100vh}
.bead{width:20px;height:20px;border:1px solid #cbd5e1;cursor:pointer;flex-shrink:0}
.bead:hover{outline:2px solid #60a5fa}
.round{border-radius:50%}
.cylinder{border-radius:4px}
.selected{outline:3px solid #3b82f6}
.swatch{width:26px;height:26px;border-radius:50%;border:2px solid #e5e7eb;cursor:pointer}
.row{display:flex;gap:2px;justify-content:center}
.ruler{width:42px;font-size:10px;color:#64748b;text-align:center;height:22px}
.no-print{}
@media print{.no-print{display:none!important}body{background:white}}
</style>
</head>

<body class="text-slate-800">

<header class="no-print bg-white shadow p-3 sticky top-0 z-20">
  <div class="max-w-7xl mx-auto flex gap-2">
    <button id="saveProject" class="px-3 py-1 rounded hover:bg-slate-100">Save Project</button>
    <label class="px-3 py-1 rounded hover:bg-slate-100 cursor-pointer">
      Load Project
      <input id="loadProject" type="file" accept=".beadpattern,.json" hidden>
    </label>
    <button id="exportImage" class="px-3 py-1 rounded hover:bg-slate-100">Export Image</button>
    <button id="exportPDF" class="px-3 py-1 rounded hover:bg-slate-100">Export PDF</button>
    <button id="clearBtn" class="px-3 py-1 rounded hover:bg-slate-100">Clear</button>
  </div>
</header>

<div class="no-print max-w-7xl mx-auto p-4">
  <div class="text-center bg-white/80 rounded-xl shadow p-4 mb-6">
    <h1 class="text-3xl font-bold">Bead Pattern Designer Pro</h1>
    <p class="text-slate-500">Diamond earring tops, brick fringe, loom, and simple bead graphing.</p>
  </div>

  <div class="grid lg:grid-cols-4 gap-6">

    <aside class="bg-white/80 rounded-xl shadow p-4 space-y-4">
      <h2 class="font-bold text-lg">Pattern Settings</h2>

      <div>
        <label class="text-sm font-semibold">Pattern Type</label>
        <select id="patternType" class="w-full border rounded p-2">
          <option value="diamond" selected>Diamond Earring Top</option>
          <option value="brick">Brick + Fringe</option>
          <option value="loom">Loom</option>
        </select>
      </div>

      <div>
        <label id="widthLabel" class="text-sm font-semibold">Widest Point Beads</label>
        <input id="widthInput" type="number" value="15" min="3" max="51" class="w-full border rounded p-2">
      </div>

      <div id="lengthWrap">
        <label class="text-sm font-semibold">Length / Fringe Rows</label>
        <input id="lengthInput" type="number" value="30" min="1" max="200" class="w-full border rounded p-2">
      </div>

      <div id="fringeWrap">
        <label class="text-sm font-semibold">Number of Fringes</label>
        <input id="fringeInput" type="number" value="17" min="1" max="99" class="w-full border rounded p-2">
      </div>

      <div>
        <label class="text-sm font-semibold">Bead Shape</label>
        <select id="beadShape" class="w-full border rounded p-2">
          <option value="round" selected>Round Seed Bead</option>
          <option value="cylinder">Cylinder / Delica</option>
        </select>
      </div>

      <button id="applyBtn" class="w-full bg-indigo-600 text-white rounded p-2 font-semibold">Apply Settings</button>

      <div class="text-xs text-slate-500">
        Diamond top creates 3 loop rows of 2 beads, then increases to the widest point, then decreases to 1 bead.
      </div>
    </aside>

    <main class="lg:col-span-2 bg-white/80 rounded-xl shadow p-4 overflow-auto">
      <div class="flex items-center gap-2 mb-3">
        <button id="zoomOut" class="border rounded px-2">−</button>
        <button id="zoomReset" class="border rounded px-2">100%</button>
        <button id="zoomIn" class="border rounded px-2">+</button>
      </div>

      <div id="canvasWrap" class="overflow-auto min-h-[550px]">
        <div id="patternArea" class="inline-block"></div>
      </div>
    </main>

    <aside class="bg-white/80 rounded-xl shadow p-4 space-y-4">
      <h2 class="font-bold text-lg">Color Tools</h2>

      <input id="colorPicker" type="color" value="#000000" class="w-16 h-16">

      <div class="flex gap-2 flex-wrap" id="palette"></div>

      <div class="grid grid-cols-2 gap-2">
        <button id="paintTool" class="border rounded p-2 selected">Paint</button>
        <button id="eraseTool" class="border rounded p-2">Erase</button>
        <button id="pickTool" class="border rounded p-2">Pick</button>
        <button id="replaceTool" class="border rounded p-2">Replace</button>
      </div>

      <div class="grid grid-cols-2 gap-2">
        <button id="mirrorV" class="border rounded p-2">Mirror V</button>
        <button id="mirrorH" class="border rounded p-2">Mirror H</button>
      </div>

      <button id="countBtn" class="w-full border rounded p-2">Bead Count</button>
      <div id="countBox" class="text-sm space-y-1"></div>

      <hr>

      <h2 class="font-bold text-lg">Image Reference</h2>
      <input id="imageInput" type="file" accept="image/*" class="text-sm">
      <img id="imagePreview" class="hidden rounded shadow max-w-full">
      <button id="paletteFromImage" class="hidden w-full bg-slate-600 text-white rounded p-2">Generate Palette</button>
    </aside>
  </div>
</div>

<div id="printArea" class="hidden bg-white p-6">
  <h1 style="font-size:24px;font-weight:bold;margin-bottom:16px;">Bead Pattern</h1>
  <div id="printPattern"></div>
  <h2 style="font-size:18px;font-weight:bold;margin-top:20px;">Color Key</h2>
  <div id="printKey"></div>
  <h2 style="font-size:18px;font-weight:bold;margin-top:20px;">Word Chart</h2>
  <div id="wordChart" style="font-size:12px;"></div>
</div>

<script>
let activeTool="paint";
let isDown=false;
let zoom=1;
let uploadedImage=null;

const colors=[
"#000000","#FFFFFF","#FF0000","#FFA500","#FFFF00","#008000","#0000FF",
"#800080","#FFC0CB","#964B00","#40E0D0","#FFD700","#C0C0C0","#A9A9A9"
];

const $=id=>document.getElementById(id);

function hexFromRgb(rgb){
  if(!rgb)return "#FFFFFF";
  if(rgb.startsWith("#"))return rgb.toUpperCase();
  const m=rgb.match(/\d+/g);
  if(!m)return "#FFFFFF";
  return "#"+m.slice(0,3).map(x=>(+x).toString(16).padStart(2,"0")).join("").toUpperCase();
}

function setTool(tool){
  activeTool=tool;
  ["paintTool","eraseTool","pickTool","replaceTool"].forEach(id=>$(id).classList.remove("selected"));
  if(tool==="paint")$("paintTool").classList.add("selected");
  if(tool==="erase")$("eraseTool").classList.add("selected");
  if(tool==="pick")$("pickTool").classList.add("selected");
  if(tool==="replace")$("replaceTool").classList.add("selected");
}

function makeBead(){
  const b=document.createElement("div");
  b.className="bead "+($("beadShape").value==="round"?"round":"cylinder");
  b.dataset.color="#FFFFFF";
  b.style.backgroundColor="#FFFFFF";
  return b;
}

function makeRow(count,label=""){
  const wrap=document.createElement("div");
  wrap.style.display="flex";
  wrap.style.alignItems="center";
  wrap.style.marginBottom="2px";

  const ruler=document.createElement("div");
  ruler.className="ruler";
  ruler.textContent=label;
  wrap.appendChild(ruler);

  const row=document.createElement("div");
  row.className="row beadRow";

  for(let i=0;i<count;i++)row.appendChild(makeBead());

  wrap.appendChild(row);
  return wrap;
}

function makeAnchorRow(fringeCount){
  const wrap=document.createElement("div");
  wrap.style.display="flex";
  wrap.style.alignItems="center";
  wrap.style.marginTop="10px";

  const ruler=document.createElement("div");
  ruler.className="ruler";
  ruler.textContent="fringe";
  wrap.appendChild(ruler);

  const row=document.createElement("div");
  row.className="row";

  const center=Math.ceil(fringeCount/2);

  for(let i=1;i<=fringeCount;i++){
    const a=document.createElement("div");
    a.className="bead round";
    a.style.background="#f8fafc";
    a.style.border="1px dashed #94a3b8";
    a.style.fontSize="9px";
    a.style.display="flex";
    a.style.alignItems="center";
    a.style.justifyContent="center";
    a.dataset.anchor="true";
    a.textContent=i===center?"C":(i===1||i===fringeCount?"S":i);
    a.title=i===center?"Center fringe starts at final single bead":"Side pieces start at final increase/widest row";
    row.appendChild(a);
  }

  wrap.appendChild(row);
  return wrap;
}

function generatePattern(){
  const area=$("patternArea");
  area.innerHTML="";

  let type=$("patternType").value;
  let width=parseInt($("widthInput").value)||15;
  let length=parseInt($("lengthInput").value)||30;
  let fringeCount=parseInt($("fringeInput").value)||17;

  if(type==="diamond"){
    if(width%2===0)width++;
    $("widthInput").value=width;

    area.appendChild(makeRow(2,"loop"));
    area.appendChild(makeRow(2,"loop"));
    area.appendChild(makeRow(2,"loop"));

    for(let i=1;i<=width;i++){
      area.appendChild(makeRow(i,i===width?"side start":""));
    }

    for(let i=width-1;i>=1;i--){
      area.appendChild(makeRow(i,i===1?"center start":""));
    }

    area.appendChild(makeAnchorRow(fringeCount));

    const note=document.createElement("div");
    note.className="text-xs text-slate-500 mt-2 text-center";
    note.innerHTML="<b>C</b> = middle fringe starts at final single bead. <b>S</b> = side pieces start at final increase / widest row.";
    area.appendChild(note);
  }

  if(type==="brick"){
    for(let i=2;i<=width;i++)area.appendChild(makeRow(i,"top"));
    for(let i=1;i<=length;i++)area.appendChild(makeRow(width,i%5===0?i:"-"));
  }

  if(type==="loom"){
    for(let i=1;i<=length;i++)area.appendChild(makeRow(width,i%5===0?i:"-"));
  }
}

function applyBead(bead,color){
  bead.dataset.color=color;
  bead.style.backgroundColor=color;
}

function handleBead(bead){
  if(!bead || bead.dataset.anchor==="true")return;

  if(activeTool==="pick"){
    const c=hexFromRgb(bead.style.backgroundColor);
    $("colorPicker").value=c;
    setTool("paint");
    return;
  }

  if(activeTool==="replace"){
    const old=hexFromRgb(bead.style.backgroundColor);
    const next=$("colorPicker").value.toUpperCase();
    document.querySelectorAll(".bead").forEach(b=>{
      if(b.dataset.anchor!=="true" && hexFromRgb(b.style.backgroundColor)===old)applyBead(b,next);
    });
    setTool("paint");
    return;
  }

  const color=activeTool==="erase"?"#FFFFFF":$("colorPicker").value.toUpperCase();
  applyBead(bead,color);

  const row=bead.parentElement;
  const rows=[...document.querySelectorAll(".beadRow")];
  const beads=[...row.children];
  const rowIndex=rows.indexOf(row);
  const beadIndex=beads.indexOf(bead);

  if($("mirrorV").classList.contains("selected")){
    const mirror=beads[beads.length-1-beadIndex];
    if(mirror)applyBead(mirror,color);
  }

  if($("mirrorH").classList.contains("selected")){
    const mirrorRow=rows[rows.length-1-rowIndex];
    if(mirrorRow && mirrorRow.children[beadIndex])applyBead(mirrorRow.children[beadIndex],color);
  }
}

function setupPalette(){
  const p=$("palette");
  p.innerHTML="";
  colors.forEach(c=>{
    const s=document.createElement("div");
    s.className="swatch";
    s.style.backgroundColor=c;
    s.title=c;
    s.onclick=()=>{$("colorPicker").value=c;setTool("paint")};
    p.appendChild(s);
  });
}

function getProjectData(){
  return {
    settings:{
      patternType:$("patternType").value,
      width:$("widthInput").value,
      length:$("lengthInput").value,
      fringe:$("fringeInput").value,
      shape:$("beadShape").value
    },
    beads:[...document.querySelectorAll(".beadRow")].map(row=>
      [...row.children].map(b=>hexFromRgb(b.style.backgroundColor))
    )
  };
}

function loadProjectData(data){
  $("patternType").value=data.settings.patternType||"diamond";
  $("widthInput").value=data.settings.width||15;
  $("lengthInput").value=data.settings.length||30;
  $("fringeInput").value=data.settings.fringe||17;
  $("beadShape").value=data.settings.shape||"round";
  updateControls();
  generatePattern();

  const rows=[...document.querySelectorAll(".beadRow")];
  data.beads.forEach((r,i)=>{
    if(!rows[i])return;
    r.forEach((c,j)=>{
      if(rows[i].children[j])applyBead(rows[i].children[j],c);
    });
  });
}

function saveProject(){
  const blob=new Blob([JSON.stringify(getProjectData())],{type:"application/json"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="bead-pattern.beadpattern";
  a.click();
  URL.revokeObjectURL(a.href);
}

function preparePrint(){
  $("printPattern").innerHTML=$("patternArea").innerHTML;

  const used=new Map();
  document.querySelectorAll("#patternArea .bead").forEach(b=>{
    if(b.dataset.anchor==="true")return;
    const c=hexFromRgb(b.style.backgroundColor);
    if(c!=="#FFFFFF"&&!used.has(c))used.set(c,String.fromCharCode(65+used.size));
  });

  $("printKey").innerHTML=[...used.entries()].map(([c,l])=>
    `<div style="display:flex;align-items:center;gap:8px;margin:4px 0;">
      <div style="width:20px;height:20px;border-radius:50%;background:${c};border:1px solid #ccc"></div>
      <span>(${l}) ${c}</span>
    </div>`
  ).join("") || "No colors used.";

  let html="";
  [...document.querySelectorAll("#patternArea .beadRow")].forEach((row,i)=>{
    let parts=[];
    let last=null,count=0;
    [...row.children].forEach(b=>{
      const c=hexFromRgb(b.style.backgroundColor);
      const sym=c==="#FFFFFF"?"-":used.get(c);
      if(sym!==last){
        if(count&&last!=="-")parts.push(`(${last})x${count}`);
        last=sym;count=1;
      }else count++;
    });
    if(count&&last!=="-")parts.push(`(${last})x${count}`);
    html+=`<div><b>Row ${i+1}:</b> ${parts.join(", ")||"blank"}</div>`;
  });
  $("wordChart").innerHTML=html;
}

async function exportPDF(){
  preparePrint();
  $("printArea").classList.remove("hidden");
  $("printArea").style.position="absolute";
  $("printArea").style.left="-9999px";
  $("printArea").style.width="900px";

  const canvas=await html2canvas($("printArea"),{scale:2,backgroundColor:"#ffffff"});
  const img=canvas.toDataURL("image/png");
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF("p","pt","letter");

  const pw=pdf.internal.pageSize.getWidth();
  const ph=pdf.internal.pageSize.getHeight();
  const margin=30;
  const ratio=Math.min((pw-margin*2)/canvas.width,(ph-margin*2)/canvas.height);
  const w=canvas.width*ratio;
  const h=canvas.height*ratio;

  pdf.addImage(img,"PNG",(pw-w)/2,margin,w,h);
  pdf.save("bead-pattern.pdf");

  $("printArea").classList.add("hidden");
}

async function exportImage(){
  preparePrint();
  $("printArea").classList.remove("hidden");
  $("printArea").style.position="absolute";
  $("printArea").style.left="-9999px";
  $("printArea").style.width="900px";

  const canvas=await html2canvas($("printArea"),{scale:2,backgroundColor:"#ffffff"});
  const a=document.createElement("a");
  a.href=canvas.toDataURL("image/png");
  a.download="bead-pattern.png";
  a.click();

  $("printArea").classList.add("hidden");
}

function beadCount(){
  const counts={};
  document.querySelectorAll("#patternArea .bead").forEach(b=>{
    if(b.dataset.anchor==="true")return;
    const c=hexFromRgb(b.style.backgroundColor);
    if(c==="#FFFFFF")return;
    counts[c]=(counts[c]||0)+1;
  });

  $("countBox").innerHTML=Object.keys(counts).length
    ? Object.entries(counts).map(([c,n])=>`<div><span style="display:inline-block;width:14px;height:14px;background:${c};border:1px solid #ccc"></span> ${c}: ${n}</div>`).join("")
    : "No colored beads yet.";
}

function updateControls(){
  const isDiamond=$("patternType").value==="diamond";
  $("widthLabel").textContent=isDiamond?"Widest Point Beads":"Width Beads";
  $("lengthWrap").style.display=isDiamond?"none":"block";
  $("fringeWrap").style.display=isDiamond?"block":"none";
}

function generatePaletteFromImage(){
  if(!uploadedImage)return;
  const img=new Image();
  img.onload=()=>{
    const canvas=document.createElement("canvas");
    const ctx=canvas.getContext("2d");
    canvas.width=150;canvas.height=150;
    ctx.drawImage(img,0,0,150,150);
    const data=ctx.getImageData(0,0,150,150).data;
    const buckets={};
    for(let i=0;i<data.length;i+=16){
      const r=Math.round(data[i]/32)*32;
      const g=Math.round(data[i+1]/32)*32;
      const b=Math.round(data[i+2]/32)*32;
      const c="#"+[r,g,b].map(x=>Math.min(255,x).toString(16).padStart(2,"0")).join("").toUpperCase();
      buckets[c]=(buckets[c]||0)+1;
    }
    Object.entries(buckets).sort((a,b)=>b[1]-a[1]).slice(0,10).forEach(([c])=>{
      if(!colors.includes(c))colors.push(c);
    });
    setupPalette();
  };
  img.src=uploadedImage;
}

$("patternArea").addEventListener("mousedown",e=>{isDown=true;if(e.target.classList.contains("bead"))handleBead(e.target)});
$("patternArea").addEventListener("mouseover",e=>{if(isDown&&e.target.classList.contains("bead")&&!["pick","replace"].includes(activeTool))handleBead(e.target)});
document.addEventListener("mouseup",()=>isDown=false);

$("applyBtn").onclick=generatePattern;
$("clearBtn").onclick=()=>document.querySelectorAll("#patternArea .bead").forEach(b=>{if(b.dataset.anchor!=="true")applyBead(b,"#FFFFFF")});
$("paintTool").onclick=()=>setTool("paint");
$("eraseTool").onclick=()=>setTool("erase");
$("pickTool").onclick=()=>setTool("pick");
$("replaceTool").onclick=()=>setTool("replace");
$("mirrorV").onclick=()=>$("mirrorV").classList.toggle("selected");
$("mirrorH").onclick=()=>$("mirrorH").classList.toggle("selected");
$("saveProject").onclick=saveProject;
$("exportPDF").onclick=exportPDF;
$("exportImage").onclick=exportImage;
$("countBtn").onclick=beadCount;

$("loadProject").onchange=e=>{
  const file=e.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>loadProjectData(JSON.parse(r.result));
  r.readAsText(file);
};

$("patternType").onchange=()=>{updateControls();generatePattern()};
$("beadShape").onchange=generatePattern;

$("zoomIn").onclick=()=>{zoom=Math.min(3,zoom+.2);$("patternArea").style.transform=`scale(${zoom})`;$("patternArea").style.transformOrigin="top left"};
$("zoomOut").onclick=()=>{zoom=Math.max(.3,zoom-.2);$("patternArea").style.transform=`scale(${zoom})`;$("patternArea").style.transformOrigin="top left"};
$("zoomReset").onclick=()=>{zoom=1;$("patternArea").style.transform="scale(1)"};

$("imageInput").onchange=e=>{
  const file=e.target.files[0];
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    uploadedImage=r.result;
    $("imagePreview").src=uploadedImage;
    $("imagePreview").classList.remove("hidden");
    $("paletteFromImage").classList.remove("hidden");
  };
  r.readAsDataURL(file);
};

$("paletteFromImage").onclick=generatePaletteFromImage;

$("imagePreview").onclick=e=>{
  if(activeTool!=="pick")return;
  const img=$("imagePreview");
  const canvas=document.createElement("canvas");
  const ctx=canvas.getContext("2d");
  canvas.width=img.naturalWidth;
  canvas.height=img.naturalHeight;
  ctx.drawImage(img,0,0);
  const rect=img.getBoundingClientRect();
  const x=Math.floor((e.clientX-rect.left)*(img.naturalWidth/rect.width));
  const y=Math.floor((e.clientY-rect.top)*(img.naturalHeight/rect.height));
  const p=ctx.getImageData(x,y,1,1).data;
  $("colorPicker").value=hexFromRgb(`rgb(${p[0]},${p[1]},${p[2]})`);
  setTool("paint");
};

setupPalette();
updateControls();
generatePattern();
</script>

</body>
</html>
